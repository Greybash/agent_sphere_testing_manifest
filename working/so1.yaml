# recreate-real-https-redirect-to-80.yaml
# Recreates original issue:
# HTTPS request gets redirected to https://host:80/

apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
      - name: java-app

        # Real Java image
        image: tomcat:9-jdk17

        ports:
        - containerPort: 8080

        # Intentionally broken proxy handling
        env:
        - name: SERVER_PORT
          value: "80"
---
apiVersion: v1
kind: Service
metadata:
  name: java-app
spec:
  selector:
    app: java-app
  ports:
  - port: 9080
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: java-app
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - www.example2.com
    secretName: tls-secret
  rules:
  - host: www.example2.com
    http:
      paths:
      - path: /app/eh
        pathType: Prefix
        backend:
          service:
            name: java-app
            port:
              number: 9080


