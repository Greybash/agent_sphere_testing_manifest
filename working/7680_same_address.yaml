apiVersion: v1
kind: Namespace
metadata:
  name: containerport-conflict-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-1
  namespace: containerport-conflict-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shared-app
  template:
    metadata:
      labels:
        app: shared-app
    spec:
      hostNetwork: true
      containers:
        - name: web
          image: nginx:latest
          ports:
            - containerPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-2
  namespace: containerport-conflict-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shared-app
  template:
    metadata:
      labels:
        app: shared-app
    spec:
      hostNetwork: true
      containers:
        - name: web
          image: nginx:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: shared-service
  namespace: containerport-conflict-test
spec:
  selector:
    app: shared-app
  ports:
    - port: 80
      targetPort: 3000