apiVersion: apps/v1
kind: Deployment
metadata:
  name: volume-stuck-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: volume-stuck-app
  template:
    metadata:
      labels:
        app: volume-stuck-app
    spec:
      containers:
      - name: app
        image: nginx:latest
        volumeMounts:
        - name: data
          mountPath: /usr/share/nginx/html
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: missing-pvc