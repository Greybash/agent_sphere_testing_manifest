apiVersion: v1
kind: Namespace
metadata:
  name: configmap-missing-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: configmap-app
  namespace: configmap-missing-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: configmap-app
  template:
    metadata:
      labels:
        app: configmap-app
    spec:
      containers:
        - name: app
          image: nginx:latest
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: app-config   # ❌ This ConfigMap does NOT exist
                  key: mode
          ports:
            - containerPort: 80