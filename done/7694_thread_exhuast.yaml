apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomcat-thread-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tomcat-thread-app
  template:
    metadata:
      labels:
        app: tomcat-thread-app
    spec:
      containers:
      - name: app
        image: maven:3.9-eclipse-temurin-17
        command: ["sh","-c"]
        args:
          - |
            mkdir -p /app/src/main/java/com/example
            cd /app

            cat > pom.xml <<'EOF'
            <project xmlns="http://maven.apache.org/POM/4.0.0">
              <modelVersion>4.0.0</modelVersion>
              <groupId>com.example</groupId>
              <artifactId>demo</artifactId>
              <version>1.0</version>
              <parent>
                <groupId>org.springframework.boot</groupId>
                <artifactId>spring-boot-starter-parent</artifactId>
                <version>3.2.5</version>
              </parent>
              <properties>
                <java.version>17</java.version>
              </properties>
              <dependencies>
                <dependency>
                  <groupId>org.springframework.boot</groupId>
                  <artifactId>spring-boot-starter-web</artifactId>
                </dependency>
              </dependencies>
            </project>
            EOF

            cat > src/main/java/com/example/App.java <<'EOF'
            package com.example;

            import org.springframework.boot.SpringApplication;
            import org.springframework.boot.autoconfigure.SpringBootApplication;
            import org.springframework.web.bind.annotation.*;

            @SpringBootApplication
            @RestController
            public class App {

              @GetMapping("/")
              public String ok() { return "ok"; }

              @GetMapping("/slow")
              public String slow() throws Exception {
                Thread.sleep(60000);   // holds thread for 60 sec
                return "done";
              }

              public static void main(String[] args) {
                SpringApplication.run(App.class, args);
              }
            }
            EOF

            mkdir -p src/main/resources
            cat > src/main/resources/application.properties <<'EOF'
            server.port=8080
            server.tomcat.threads.max=5
            server.tomcat.accept-count=2
            EOF

            mvn spring-boot:run
        ports:
        - containerPort: 8080