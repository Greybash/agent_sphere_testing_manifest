apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shared-app
  template:
    metadata:
      labels:
        app: shared-app
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: aks-nodepool1-40156650-vmss00000p
      containers:
      - name: web
        image: nginx:latest
        command: ["/bin/sh","-c"]
        args:
          - sed -i 's/listen       80;/listen 3000;/' /etc/nginx/conf.d/default.conf || true;
            sed -i 's/listen 80;/listen 3000;/' /etc/nginx/conf.d/default.conf || true;
            nginx -g 'daemon off;';
        ports:
        - containerPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shared-app
  template:
    metadata:
      labels:
        app: shared-app
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: aks-nodepool1-40156650-vmss00000p
      containers:
      - name: web
        image: nginx:latest
        command: ["/bin/sh","-c"]
        args:
          - sed -i 's/listen       80;/listen 3000;/' /etc/nginx/conf.d/default.conf || true;
