apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bad-backend
  template:
    metadata:
      labels:
        app: bad-backend
    spec:
      containers:
      - name: app
        image: python:3.11-slim
        command: ["/bin/sh"]
        args:
          - -c
          - |
            pip install flask >/dev/null 2>&1
            cat <<EOF > app.py
            from flask import Flask
            import random, time

            app = Flask(__name__)

            @app.route("/")
            def home():
                if random.random() < 0.5:
                    time.sleep(3)
                return "OK"

            app.run(host="0.0.0.0", port=5000)
            EOF
            python app.py
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: bad-service
spec:
  selector:
    app: bad-backend
  ports:
  - port: 80
    targetPort: 4000   # ❌ WRONG PORT (intentional bug)

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events {}
    http {
      upstream backend {
        server bad-service:80;
      }

      server {
        listen 80;

        location / {
          proxy_pass http://backend;
          proxy_connect_timeout 1s;
          proxy_read_timeout 1s;
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: config
        configMap:
          name: nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007

