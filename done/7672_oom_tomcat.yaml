apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomcat-oom-limited
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tomcat-oom-limited
  template:
    metadata:
      labels:
        app: tomcat-oom-limited
    spec:
      containers:
      - name: tomcat
        image: tomcat:9.0-jdk17
        ports:
        - containerPort: 8080

        # ❌ BAD JVM CONFIG (kept intentionally)
        env:
        - name: JAVA_OPTS
          value: "-Xms1024m -Xmx1024m"

        resources:
          limits:
            memory: "64Mi"

        command: ["/bin/sh"]
        args:
          - -c
          - |
            echo "Starting controlled JVM OOM test..."

            # 🔥 create Java program that consumes heap
            cat <<EOF > OOM.java
            import java.util.*;
            public class OOM {
              public static void main(String[] args) {
                List<byte[]> list = new ArrayList<>();
                while(true) {
                  list.add(new byte[5_000_000]); // 5MB chunks
                }
              }
            }
            EOF

            javac OOM.java

            # 🔁 LIMITED LOOP (your requirement)
            for i in 1 2 3 4 5 6; do
              echo "Attempt $i: triggering JVM OOM..."
              java OOM || true
              sleep 1
            done

            echo "Starting Tomcat after stress..."
            catalina.sh run


# kubectl patch deployment tomcat-oom-limited \
# -p '{"spec":{"template":{"spec":{"containers":[{"name":"tomcat","resources":{"limits":{"memory":"256Mi"}}}]}}}}'


