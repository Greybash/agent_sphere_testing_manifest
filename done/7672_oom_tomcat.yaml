apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomcat-oom-limited
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tomcat-oom-limited
  template:
    metadata:
      labels:
        app: tomcat-oom-limited
    spec:
      containers:
      - name: tomcat
        image: tomcat:9.0-jdk17
        ports:
        - containerPort: 8080

        # ❌ BAD JVM CONFIG (kept intentionally)
        env:
        - name: JAVA_OPTS
          value: "-Xms1024m -Xmx1024m"

        resources:
          limits:
            memory: "64Mi"

        command: ["/bin/sh"]
        args:
          - -c
          - |
            import java.util.*;

            public class OOM {
              public static void main(String[] args) throws Exception {

                List<byte[]> list = new ArrayList<>();

                long targetMB = 64;   // 🎯 target heap usage
                long chunkSizeMB = 2; // each allocation = 2MB

                long allocated = 0;

                System.out.println("Starting controlled memory allocation...");

                while (allocated < targetMB) {
                  list.add(new byte[(int)(chunkSizeMB * 1024 * 1024)]);
                  allocated += chunkSizeMB;

                  System.out.println("Allocated: " + allocated + " MB");
                  Thread.sleep(100);
                }

                System.out.println("✅ Reached target (" + targetMB + " MB). Stopping allocation.");

                // Keep memory for some time (simulate pressure)
                Thread.sleep(10000);

                // Optional: release memory
                list.clear();
                System.gc();

                System.out.println("♻️ Memory released. JVM healthy.");
              }
            }


# kubectl patch deployment tomcat-oom-limited \
# -p '{"spec":{"template":{"spec":{"containers":[{"name":"tomcat","resources":{"limits":{"memory":"256Mi"}}}]}}}}'

# kubectl set env deployment/tomcat-oom-limited \
# JAVA_OPTS="-Xms128m -Xmx128m"