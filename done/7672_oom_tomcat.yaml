apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomcat-oom-limited
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tomcat-oom-limited
  template:
    metadata:
      labels:
        app: tomcat-oom-limited
    spec:
      containers:
      - name: tomcat
        image: tomcat:9.0-jdk17
        ports:
        - containerPort: 8080

        # ❌ intentionally bad (for initial OOM scenario)
        env:
        - name: JAVA_OPTS
          value: "-Xms1024m -Xmx1024m"

        resources:
          limits:
            memory: "64Mi"

        command: ["/bin/sh"]
        args:
          - -c
          - |
            echo "Creating Java memory injector..."

            cat <<EOF > OOM.java
            import java.util.*;

            public class OOM {
              public static void main(String[] args) throws Exception {

                List<byte[]> list = new ArrayList<>();

                long targetMB = 64;
                long chunkSizeMB = 2;
                long allocated = 0;

                System.out.println("Starting controlled memory allocation...");

                while (allocated < targetMB) {
                  list.add(new byte[(int)(chunkSizeMB * 1024 * 1024)]);
                  allocated += chunkSizeMB;

                  System.out.println("Allocated: " + allocated + " MB");
                  Thread.sleep(100);
                }

                System.out.println("Reached 64MB. Holding...");
                Thread.sleep(10000);

                list.clear();
                System.gc();

                System.out.println("Memory released.");
              }
            }
            EOF

            echo "Compiling..."
            javac OOM.java

            echo "Running memory injector..."
            java OOM || true

            echo "Starting Tomcat..."
            catalina.sh run



# kubectl patch deployment tomcat-oom-limited \
# -p '{"spec":{"template":{"spec":{"containers":[{"name":"tomcat","resources":{"limits":{"memory":"256Mi"}}}]}}}}'

# kubectl set env deployment/tomcat-oom-limited \
